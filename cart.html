<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - VIREXA BIO</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            color: #1e293b;
            min-height: 100vh;
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 40px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid #e2e8f0;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e3a5f, #2c5282);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }

        .cart-btn {
            background: #1e3a5f;
            border: none;
            padding: 8px 20px;
            color: white;
            cursor: pointer;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .cart-btn:hover {
            background: #2c5282;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 100px 20px 60px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .checkout-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 40px;
            margin-top: 32px;
        }

        .checkout-form {
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            padding: 28px;
        }

        .form-section {
            margin-bottom: 28px;
        }

        .form-section h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e2e8f0;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.85rem;
            color: #334155;
        }

        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #1e3a5f;
            box-shadow: 0 0 0 3px rgba(30, 58, 95, 0.1);
        }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .order-summary {
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            padding: 24px;
            position: sticky;
            top: 100px;
            height: fit-content;
        }

        .order-summary h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 20px;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 0.9rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .summary-row.total {
            border-bottom: none;
            padding-top: 16px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #1e3a5f;
        }

        .place-order-btn {
            width: 100%;
            background: #1e3a5f;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
        }

        .place-order-btn:hover {
            background: #2c5282;
            transform: translateY(-2px);
        }

        .success-container {
            text-align: center;
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            padding: 50px;
            max-width: 600px;
            margin: 100px auto 0;
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .order-number {
            background: #1e3a5f;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            display: inline-block;
            margin: 20px 0;
            font-family: monospace;
            font-size: 1rem;
        }

        .btn {
            display: inline-block;
            background: #1e3a5f;
            color: white;
            text-decoration: none;
            padding: 12px 32px;
            border-radius: 40px;
            font-weight: 600;
            margin-top: 20px;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #2c5282;
            transform: translateY(-2px);
        }

        footer {
            text-align: center;
            padding: 40px;
            background: white;
            border-top: 1px solid #e2e8f0;
            margin-top: 40px;
        }

        footer p {
            color: #64748b;
            font-size: 0.85rem;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1e3a5f;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 900px) {
            .checkout-grid {
                grid-template-columns: 1fr;
            }
            
            .navbar {
                padding: 14px 20px;
            }
            
            .container {
                padding: 80px 16px 40px;
            }
        }
    </style>
</head>
<body>

<header class="navbar">
    <div class="logo" onclick="window.location.href='index.html'">VIREXA BIO</div>
    <button class="cart-btn" onclick="window.location.href='Tabl.html'">← Back to home</button>
</header>

<div class="container" id="app">
    <!-- Content loads via JS -->
</div>

<footer>
    <p>© 2026 VIREXA BIO — Advanced Pharmaceutical Solutions</p>
    <p style="margin-top: 8px;">For research purposes only. Not for human consumption.</p>
</footer>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const isSuccess = urlParams.get('success') === 'true';
    
    const cart = JSON.parse(localStorage.getItem('cartItems')) || [];
    const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    const shipping = subtotal > 100 ? 0 : 9.99;
    const total = subtotal + shipping;
    
    function generateOrderNumber() {
        return 'VX-' + Date.now().toString().slice(-8) + '-' + Math.floor(Math.random() * 1000);
    }
    
    function saveOrderToDatabase(orderData) {
        let orders = JSON.parse(localStorage.getItem('orders')) || [];
        orders.push(orderData);
        localStorage.setItem('orders', JSON.stringify(orders));
        
        console.log('Order saved to database (localStorage):', orderData);
        
        // Here you would normally send to real backend:
        // fetch('/api/orders', {
        //     method: 'POST',
        //     headers: { 'Content-Type': 'application/json' },
        //     body: JSON.stringify(orderData)
        // });
    }
    
    if (isSuccess) {
        document.getElementById('app').innerHTML = `
            <div class="success-container">
                <div class="success-icon">🎉</div>
                <h1>Order Confirmed!</h1>
                <p>Thank you for your purchase. Your order has been successfully placed.</p>
                <div class="order-number">${localStorage.getItem('lastOrderNumber') || 'VX-' + Date.now().toString().slice(-8)}</div>
                <p>A confirmation email has been sent to your email address.</p>
                <a href="index.html" class="btn">Continue Shopping →</a>
            </div>
        `;
        localStorage.removeItem('cartItems');
        localStorage.removeItem('cartTotalCount');
    } else {
        if (cart.length === 0) {
            window.location.href = 'cart.html';
        }
        
        document.getElementById('app').innerHTML = `
            <h1>Checkout</h1>
            <p style="color: #64748b;">Complete your order information</p>
            
            <div class="checkout-grid">
                <form class="checkout-form" id="checkoutForm">
                    <div class="form-section">
                        <h3>Personal Information</h3>
                        <div class="form-group">
                            <label>Full Name *</label>
                            <input type="text" id="fullName" required placeholder="John Doe">
                        </div>
                        <div class="row-2">
                            <div class="form-group">
                                <label>Email *</label>
                                <input type="email" id="email" required placeholder="john@example.com">
                            </div>
                            <div class="form-group">
                                <label>Phone *</label>
                                <input type="tel" id="phone" required placeholder="+1 234 567 8900">
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-section">
                        <h3>Shipping Address</h3>
                        <div class="form-group">
                            <label>Street Address *</label>
                            <input type="text" id="address" required placeholder="123 Main St">
                        </div>
                        <div class="row-2">
                            <div class="form-group">
                                <label>City *</label>
                                <input type="text" id="city" required placeholder="New York">
                            </div>
                            <div class="form-group">
                                <label>Postal Code *</label>
                                <input type="text" id="postal" required placeholder="10001">
                            </div>
                        </div>
                        <div class="row-2">
                            <div class="form-group">
                                <label>Country *</label>
                                <select id="country">
                                    <option value="US">United States</option>
                                    <option value="CA">Canada</option>
                                    <option value="UK">United Kingdom</option>
                                    <option value="AU">Australia</option>
                                    <option value="DE">Germany</option>
                                    <option value="FR">France</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Payment Method *</label>
                                <select id="payment">
                                    <option value="credit_card">Credit Card</option>
                                    <option value="paypal">PayPal</option>
                                    <option value="crypto">Cryptocurrency</option>
                                    <option value="bank_transfer">Bank Transfer</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </form>
                
                <div class="order-summary">
                    <h3>Order Summary</h3>
                    ${cart.map(item => `
                        <div class="order-item">
                            <span>${item.name} x${item.quantity}</span>
                            <span>$${(item.price * item.quantity).toFixed(2)}</span>
                        </div>
                    `).join('')}
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span>$${subtotal.toFixed(2)}</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span>${shipping === 0 ? 'Free' : '$' + shipping.toFixed(2)}</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span>$${total.toFixed(2)}</span>
                    </div>
                    <button class="place-order-btn" id="placeOrderBtn">Place Order →</button>
                </div>
            </div>
        `;
        
        document.getElementById('placeOrderBtn').addEventListener('click', () => {
            const fullName = document.getElementById('fullName')?.value.trim();
            const email = document.getElementById('email')?.value.trim();
            const phone = document.getElementById('phone')?.value.trim();
            const address = document.getElementById('address')?.value.trim();
            const city = document.getElementById('city')?.value.trim();
            const postal = document.getElementById('postal')?.value.trim();
            const country = document.getElementById('country')?.value;
            const payment = document.getElementById('payment')?.value;
            
            if (!fullName || !email || !phone || !address || !city || !postal) {
                alert('Please fill in all required fields');
                return;
            }
            
            const orderNumber = generateOrderNumber();
            const orderData = {
                orderNumber: orderNumber,
                date: new Date().toISOString(),
                customer: {
                    name: fullName,
                    email: email,
                    phone: phone,
                    address: address,
                    city: city,
                    postalCode: postal,
                    country: country
                },
                items: cart.map(item => ({
                    name: item.name,
                    price: item.price,
                    quantity: item.quantity,
                    total: item.price * item.quantity
                })),
                paymentMethod: payment,
                subtotal: subtotal,
                shipping: shipping,
                total: total,
                status: 'pending'
            };
            
            saveOrderToDatabase(orderData);
            localStorage.setItem('lastOrderNumber', orderNumber);
            
            window.location.href = 'checkout.html?success=true';
        });
    }
</script>
</body>
</html>
